<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الكتب - Home Books</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>Home Books</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-btn">الرئيسية</a>
                <a href="order.html" class="nav-btn">الشحن والطلب</a>
            </nav>
        </div>
    </header>

    <!-- Books Section -->
    <section class="books">
        <div class="container">
            <h2 class="section-title">الكتب المتاحة</h2>
            
            <!-- Filters -->
            <div class="filters">
                <button class="filter-btn active" data-filter="all">الكل</button>
                <button class="filter-btn" data-filter="ادبية">أدبية</button>
                <button class="filter-btn" data-filter="دينية">دينية</button>
                <button class="filter-btn" data-filter="تنموية">تنموية</button>
                <button class="filter-btn" data-filter="ثقافية">ثقافية</button>
            </div>

            <div class="books-grid" id="booksGrid">
                <!-- الكتب ستُضاف ديناميكياً بواسطة JavaScript -->
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
