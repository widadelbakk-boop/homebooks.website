<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشحن والطلب - Home Books</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <i class="fas fa-book-open"></i>
                <h1>Home Books</h1>
            </div>
            <nav class="nav">
                <a href="index.html" class="nav-btn">الرئيسية</a>
                <a href="books.html" class="nav-btn">الكتب</a>
            </nav>
        </div>
    </header>

    <!-- Order Section -->
    <section class="order">
        <div class="container">
            <h2 class="section-title">الشحن والطلب</h2>
            
            <div class="order-info">
                <div class="info-step">
                    <i class="fas fa-book"></i>
                    <span>1. اختر الكتاب من صفحة الكتب</span>
                </div>
                <div class="info-step">
                    <i class="fas fa-edit"></i>
                    <span>2. املأ استمارة الطلب</span>
                </div>
                <div class="info-step">
                    <i class="fas fa-check-circle"></i>
                    <span>3. سيتم التواصل معك لتأكيد الشحن والدفع</span>
                </div>
            </div>

            <form class="order-form" id="orderForm">
                <div class="form-group">
                    <label>الاسم الكامل *</label>
                    <input type="text" name="fullName" required>
                </div>
                
                <div class="form-group">
                    <label>رقم الهاتف *</label>
                    <input type="tel" name="phone" required>
                </div>
                
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" name="email">
                </div>
                
                <div class="form-group">
                    <label>العنوان الكامل *</label>
                    <textarea name="address" rows="3" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>اسم الكتاب *</label>
                    <input type="text" name="bookName" required>
                </div>
                
                <div class="form-group">
                    <label>عدد النسخ *</label>
                    <input type="number" name="quantity" min="1" value="1" required>
                </div>
                
                <div class="form-group">
                    <label>ملاحظات إضافية</label>
                    <textarea name="notes" rows="3"></textarea>
                </div>
                
                <button type="submit" class="submit-btn">
                    <i class="fas fa-paper-plane"></i>
                    إرسال الطلب
                </button>
            </form>

            <div id="successMessage" class="success-message" style="display: none;">
                <i class="fas fa-check-circle"></i>
                تم استلام طلبك بنجاح! سيتم التواصل معك قريباً لتأكيد الشحن والدفع.
            </div>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
